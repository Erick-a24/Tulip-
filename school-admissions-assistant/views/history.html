<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Question History — School Admissions & Marketing Assistant</title>
<link rel="stylesheet" href="/styles.css">
</head>
<body>

<header class="app-header">
  <button id="logout-btn" class="logout-btn" type="button">Log out</button>
  <h1>Question History</h1>
  <p class="subtitle">Every question asked and the assistant's reply, most recent first.</p>
  <nav class="app-nav">
    <a href="/">Back to chat</a>
  </nav>
</header>

<main class="history-wrap">
  <div id="history-list" class="history-list"></div>
  <p id="history-empty" class="history-empty" hidden>No questions have been asked yet.</p>
</main>

<script src="/history.js"></script>
</body>
</html>
