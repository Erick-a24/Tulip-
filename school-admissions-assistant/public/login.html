<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Log in — School Admissions & Marketing Assistant</title>
<link rel="stylesheet" href="/styles.css">
</head>
<body>

<svg style="display:none">
  <defs>
    <symbol id="icon-pencil" viewBox="0 0 24 24" fill="currentColor"><path d="M2.5 21.5l1-4.24L14.34 6.42l3.24 3.24L6.74 20.5l-4.24 1zm13.4-16.6l1.77-1.77a1.5 1.5 0 0 1 2.12 0l1.12 1.12a1.5 1.5 0 0 1 0 2.12l-1.77 1.77-3.24-3.24z"/></symbol>
    <symbol id="icon-pen" viewBox="0 0 24 24" fill="currentColor"><path d="M3 21l0.8-3.8L14 8l3 3L6.8 21.8 3 21z"/><path d="M15 7l1.5-1.5a1.5 1.5 0 0 1 2.1 0l0.9 0.9a1.5 1.5 0 0 1 0 2.1L18 10 15 7z"/></symbol>
    <symbol id="icon-ruler" viewBox="0 0 24 24" fill="currentColor"><path d="M2 8h20v8H2V8zm2 2v1.5h1.5V10H4zm3 0v3h1.5v-3H7zm3 0v1.5h1.5V10H10zm3 0v3h1.5v-3H13zm3 0v1.5h1.5V10H16z"/></symbol>
    <symbol id="icon-books" viewBox="0 0 24 24" fill="currentColor"><rect x="2" y="16" width="20" height="3" rx="0.5"/><rect x="3" y="12" width="18" height="3" rx="0.5"/><rect x="4" y="4" width="14" height="7" rx="0.5"/></symbol>
    <symbol id="icon-cactus" viewBox="0 0 24 24" fill="currentColor"><path d="M10 3a2 2 0 0 1 4 0v12h-4V3z"/><path d="M7 8a2 2 0 0 1 3 1.7V13H8a2 2 0 0 1-2-2V9a1 1 0 0 1 1-1z"/><path d="M17 10a2 2 0 0 0-3 1.7V15h2a2 2 0 0 0 2-2v-2a1 1 0 0 0-1-1z"/><path d="M6 15h12l-1.2 6H7.2L6 15z"/></symbol>
    <symbol id="icon-trash" viewBox="0 0 24 24" fill="currentColor"><path d="M6 7h12l-1 14H7L6 7z"/><path d="M4 5h16v2H4z"/><path d="M9 3h6v2H9z"/></symbol>
    <symbol id="icon-blackboard" viewBox="0 0 24 24" fill="currentColor"><rect x="2" y="4" width="20" height="13" rx="1"/><line x1="5" y1="8" x2="11" y2="8" stroke="#fff" stroke-width="1" opacity="0.6"/><line x1="5" y1="11" x2="9" y2="11" stroke="#fff" stroke-width="1" opacity="0.6"/><rect x="9" y="19" width="6" height="2" rx="1"/></symbol>
    <symbol id="icon-bag" viewBox="0 0 24 24" fill="currentColor"><rect x="5" y="8" width="14" height="13" rx="3"/><rect x="9" y="4" width="6" height="6" rx="2"/><rect x="9" y="12" width="6" height="4" rx="1" fill="#fff" opacity="0.4"/></symbol>
    <symbol id="icon-canvas" viewBox="0 0 24 24" fill="currentColor"><path d="M4 20l3-14h2l3 14H4z"/><path d="M12 20l3-14h2l3 14h-8z"/><rect x="6" y="4" width="12" height="9" rx="0.5"/></symbol>
  </defs>
</svg>

<div class="decor-bg" aria-hidden="true">
  <svg class="decor-icon" style="top:6%;left:5%;width:52px;color:var(--decor-green);transform:rotate(-15deg);"><use href="#icon-pencil"/></svg>
  <svg class="decor-icon" style="top:14%;left:82%;width:46px;color:var(--decor-blue);transform:rotate(20deg);"><use href="#icon-books"/></svg>
  <svg class="decor-icon" style="top:65%;left:88%;width:50px;color:var(--decor-orange);transform:rotate(-8deg);"><use href="#icon-bag"/></svg>
  <svg class="decor-icon" style="top:78%;left:8%;width:48px;color:var(--decor-yellow);transform:rotate(10deg);"><use href="#icon-blackboard"/></svg>
  <svg class="decor-icon" style="top:4%;left:45%;width:38px;color:var(--decor-orange);transform:rotate(18deg);"><use href="#icon-cactus"/></svg>
  <svg class="decor-icon" style="top:38%;left:3%;width:42px;color:var(--decor-blue);transform:rotate(-25deg);"><use href="#icon-ruler"/></svg>
  <svg class="decor-icon" style="top:45%;left:92%;width:44px;color:var(--decor-green);transform:rotate(12deg);"><use href="#icon-pen"/></svg>
  <svg class="decor-icon" style="top:85%;left:45%;width:40px;color:var(--decor-blue);transform:rotate(-10deg);"><use href="#icon-trash"/></svg>
  <svg class="decor-icon" style="top:22%;left:20%;width:36px;color:var(--decor-yellow);transform:rotate(-20deg);"><use href="#icon-canvas"/></svg>
  <svg class="decor-icon" style="top:8%;left:65%;width:40px;color:var(--decor-green);transform:rotate(25deg);"><use href="#icon-trash"/></svg>
  <svg class="decor-icon" style="top:60%;left:15%;width:46px;color:var(--decor-orange);transform:rotate(-12deg);"><use href="#icon-books"/></svg>
  <svg class="decor-icon" style="top:90%;left:70%;width:38px;color:var(--decor-yellow);transform:rotate(15deg);"><use href="#icon-pencil"/></svg>
  <svg class="decor-icon" style="top:30%;left:68%;width:34px;color:var(--decor-blue);transform:rotate(-18deg);"><use href="#icon-cactus"/></svg>
  <svg class="decor-icon" style="top:70%;left:38%;width:42px;color:var(--decor-green);transform:rotate(8deg);"><use href="#icon-canvas"/></svg>
  <svg class="decor-icon" style="top:50%;left:48%;width:36px;color:var(--decor-yellow);transform:rotate(-15deg);"><use href="#icon-ruler"/></svg>
  <svg class="decor-icon" style="top:12%;left:12%;width:34px;color:var(--decor-orange);transform:rotate(-30deg);"><use href="#icon-bag"/></svg>
  <svg class="decor-icon" style="top:92%;left:20%;width:38px;color:var(--decor-blue);transform:rotate(20deg);"><use href="#icon-blackboard"/></svg>
  <svg class="decor-icon" style="top:35%;left:78%;width:34px;color:var(--decor-green);transform:rotate(-10deg);"><use href="#icon-pen"/></svg>
</div>

<header class="app-header">
  <h1>School Admissions &amp; Marketing Assistant</h1>
  <p class="subtitle">Please log in to continue.</p>
</header>

<main class="login-wrap">
  <form id="login-form" class="login-form">
    <label for="username">Username</label>
    <input type="text" id="username" name="username" autocomplete="username" required>

    <label for="password">Password</label>
    <input type="password" id="password" name="password" autocomplete="current-password" required>

    <button type="submit" id="login-btn">Log in</button>
    <p id="login-error" class="login-error" hidden></p>
  </form>
</main>

<script src="/login.js"></script>
</body>
</html>
